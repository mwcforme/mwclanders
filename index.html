    <!--
      PHI guard: strip query string + hash from any /book/* URL BEFORE
      analytics load, so page_location never carries PII/PHI.
      For /book/entry only, preserve search string in memory so React
      can verify the WP handoff token after the URL is sanitized.
      Runs synchronously — must stay in <head>.
    -->
    <script>
      (function () {
        try {
          if (location.pathname === '/book/entry' && location.search) {
            window.__MWC_BOOK_ENTRY_SEARCH__ = location.search;
          }
          if (location.pathname.indexOf('/book/') === 0 && (location.search || location.hash)) {
            history.replaceState(null, '', location.pathname);
          }
        } catch (e) { /* no-op */ }
      })();
    </script>

    <!--
      Analytics: GA4 + Google Ads loaded directly (no GTM).
      - dataLayer stub initialised synchronously → no lost events.
      - gtag() config runs synchronously → no lost conversions.
      - Actual GA4/Ads scripts load after window.load → zero TBT impact.
      - Sensitive booking/quiz paths: ads_data_redaction + url_passthrough.

      GA4:          G-286547777  (Men's Wellness Centers property)
      Google Ads:   AW-954193072 (conversion tracking)
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Config runs synchronously — pushes to dataLayer queue,
      // processed when the GA4 script loads after window.load.
      gtag('js', new Date());
      gtag('config', 'G-286547777', {
        send_page_view: false,  // fired manually via sanitizeAnalyticsForBookingRoute
        anonymize_ip: true,
      });
      gtag('config', 'AW-954193072');

      // Healthcare compliance: redact ad data on sensitive paths
      (function() {
        var sensitivePaths = ['/book/', '/quiz', '/ed', '/wl'];
        var path = window.location.pathname;
        var isSensitive = sensitivePaths.some(function(p) {
          return path === p || path.startsWith(p);
        });
        if (isSensitive) {
          gtag('set', 'ads_data_redaction', true);
          gtag('set', 'url_passthrough', true);
        }
      })();

      // Load GA4 + Ads scripts after page is fully painted
      function loadAnalytics() {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-286547777';
        document.head.appendChild(s);
      }

      if (document.readyState === 'complete') {
        loadAnalytics();
      } else {
        window.addEventListener('load', function() {
          setTimeout(loadAnalytics, 1);
        });
      }
    </script>

    <!-- Microsoft Clarity — deferred, prod-only, env-gated -->
    <script>
      (function () {
        var PROD_HOSTS = ["book.menswellnesscenters.com", "menswellnesscenters.com", "www.menswellnesscenters.com"];
        var STORAGE_KEY = "mwc_env_override";
        function readOverride() {
          try {
            var q = new URL(location.href).searchParams.get("env");
            if (q === "prod" || q === "stage") { localStorage.setItem(STORAGE_KEY, q); return q; }
            if (q === "auto") { localStorage.removeItem(STORAGE_KEY); return null; }
            var stored = localStorage.getItem(STORAGE_KEY);
            if (stored === "prod" || stored === "stage") return stored;
          } catch (e) {}
          return null;
        }
        var override = readOverride();
        var env = override || (PROD_HOSTS.indexOf(location.hostname.toLowerCase()) >= 0 ? "prod" : "stage");
        var clarityId = "%VITE_CLARITY_PROJECT_ID%";
        var hasRealId = clarityId && clarityId.indexOf("VITE_CLARITY_PROJECT_ID") === -1;
        if (env === "prod" && hasRealId) {
          window.clarity = window.clarity || function(){(window.clarity.q=window.clarity.q||[]).push(arguments)};
          window.clarity("set", "maskAllInputs", true);
          window.clarity("set", "maskAllText", false);
          window.addEventListener('load', function() {
            setTimeout(function() {
              var t = document.createElement('script');
              t.async = 1;
              t.src = "https://www.clarity.ms/tag/" + clarityId;
              document.head.appendChild(t);
            }, 1);
          });
        }
      })();
    </script>
