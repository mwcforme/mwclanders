    <!--
      PHI guard: strip query string + hash from any /book/* URL BEFORE
      GTM/GA4 load, so document.location.href (read by GA4 Enhanced
      Measurement events like scroll/click) never carries PII/PHI.
      For /book/entry only, preserve the original search string in memory so
      React can verify/debug the handoff after the visible URL is sanitized.
      Must run synchronously before the GTM snippet below.
    -->
    <script>
      (function () {
        try {
          if (location.pathname === '/book/entry' && location.search) {
            window.__MWC_BOOK_ENTRY_SEARCH__ = location.search;
          }
          if (location.pathname.indexOf('/book/') === 0 && (location.search || location.hash)) {
            history.replaceState(null, '', location.pathname);
          }
        } catch (e) { /* no-op */ }
      })();
    </script>

    <!-- Microsoft Clarity — deferred, env-gated (prod only) -->
    <script>
      (function () {
        const PROD_HOSTS = ["book.menswellnesscenters.com", "menswellnesscenters.com", "www.menswellnesscenters.com"];
        const STORAGE_KEY = "mwc_env_override";
        function readOverride() {
          try {
            var q = new URL(location.href).searchParams.get("env");
            if (q === "prod" || q === "stage") { localStorage.setItem(STORAGE_KEY, q); return q; }
            if (q === "auto") { localStorage.removeItem(STORAGE_KEY); return null; }
            var stored = localStorage.getItem(STORAGE_KEY);
            if (stored === "prod" || stored === "stage") return stored;
          } catch (e) {}
          return null;
        }
        var override = readOverride();
        var env = override || (PROD_HOSTS.indexOf(location.hostname.toLowerCase()) >= 0 ? "prod" : "stage");
        var clarityId = "%VITE_CLARITY_PROJECT_ID%";
        var hasRealId = clarityId && clarityId.indexOf("VITE_CLARITY_PROJECT_ID") === -1;
        if (env === "prod" && hasRealId) {
          // Stub so early clarity() calls don't throw
          window.clarity = window.clarity || function(){(window.clarity.q=window.clarity.q||[]).push(arguments)};
          window.clarity("set", "maskAllInputs", true);
          window.clarity("set", "maskAllText", false);
          // Load after page paint
          window.addEventListener('load', function() {
            setTimeout(function() {
              var t = document.createElement('script');
              t.async = 1;
              t.src = "https://www.clarity.ms/tag/" + clarityId;
              document.head.appendChild(t);
            }, 1);
          });
        }
      })();
    </script>
    <!-- End Microsoft Clarity -->

    <!--
      GTM + GA4: deferred until after page load to avoid TBT penalty.
      Queues dataLayer pushes synchronously so no events are lost.
      Actual scripts load on 'load' event (or first interaction on slow connections).
      This pattern is safe: GTM still fires all triggers, GA4 still captures page_view.
    -->
    <script>
      // Stub dataLayer immediately so any early pushes are queued
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}

      // Stub fbq so Meta Pixel GTM tags don't throw ReferenceError
      // before fbevents.js loads. GTM overwrites this with the real implementation.
      window.fbq = window.fbq || function(){
        (window.fbq.q = window.fbq.q || []).push(arguments);
      };
      window.fbq.version = '2.0';
      window._fbq = window._fbq || window.fbq;

      // Sensitive path config — set before GTM loads
      gtag('js', new Date());
      gtag('config', 'G-286547777', { send_page_view: false, anonymize_ip: true });
      (function() {
        var sensitivePaths = ['/book/', '/quiz', '/ed', '/wl'];
        var path = window.location.pathname;
        var isSensitive = sensitivePaths.some(function(p) { return path === p || path.startsWith(p); });
        if (isSensitive) {
          gtag('set', 'ads_data_redaction', true);
          gtag('set', 'url_passthrough', true);
        }
      })();

      // Defer GTM + GA4 scripts until after page load
      function loadGTM() {
        // GTM (loads GA4 G-286547777 + Ads AW-954193072 + G-795WVN2QND)
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-5X9DB23T');
      }

      // Load after window.load so it never blocks FCP/LCP
      if (document.readyState === 'complete') {
        loadGTM();
      } else {
        window.addEventListener('load', function() {
          // Small setTimeout ensures paint is committed before GTM work starts
          setTimeout(loadGTM, 1);
        });
      }
    </script>
